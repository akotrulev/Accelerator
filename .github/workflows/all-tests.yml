name: All Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Test environment (Test, Staging, …)'
        default: 'Test'
        required: false
      browser:
        description: 'Playwright browser (chromium, firefox, webkit)'
        default: 'chromium'
        required: false

jobs:
  api:
    uses: ./.github/workflows/api-tests.yml
    with:
      test_env: ${{ inputs.test_env || 'Test' }}
    secrets: inherit

  playwright:
    uses: ./.github/workflows/playwright-tests.yml
    with:
      test_env: ${{ inputs.test_env || 'Test' }}
      browser: ${{ inputs.browser || 'chromium' }}
    secrets: inherit

  appium:
    uses: ./.github/workflows/appium-tests.yml
    with:
      test_env: ${{ inputs.test_env || 'Test' }}
    secrets: inherit

  publish-report:
    needs: [api, playwright, appium]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results/
      - uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
      - uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: ignore
