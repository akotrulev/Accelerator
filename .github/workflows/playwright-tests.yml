name: Playwright Tests

on:
  push:
    branches: [master]
    paths:
      - 'PlaywrightTests/**'
      - '.github/workflows/playwright-tests.yml'
  pull_request:
    branches: [master]
    paths:
      - 'PlaywrightTests/**'
      - '.github/workflows/playwright-tests.yml'
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Test environment (Test, Staging, …)'
        default: 'Test'
        required: false
      browser:
        description: 'Browser (chromium, firefox, webkit)'
        default: 'chromium'
        required: false
  workflow_call:
    inputs:
      test_env:
        type: string
        default: 'Test'
      browser:
        type: string
        default: 'chromium'

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    env:
      TEST_ENV: ${{ inputs.test_env || 'Test' }}
      PlaywrightSettings__Headless: true
      PlaywrightSettings__BrowserType: ${{ inputs.browser || 'chromium' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - run: dotnet restore PlaywrightTests/PlaywrightTests.csproj
      - run: dotnet build PlaywrightTests/PlaywrightTests.csproj -c Release --no-restore
      - name: Install Playwright browsers
        run: pwsh PlaywrightTests/bin/Release/net8.0/playwright.ps1 install --with-deps ${{ inputs.browser || 'chromium' }}
      - run: dotnet test PlaywrightTests/PlaywrightTests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Test Results
          path: '**/TestResults/test-results.trx'
          reporter: dotnet-trx
      - name: Upload failure artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-failure-artifacts
          path: |
            failures/
            videos/
            playwright-traces/
          if-no-files-found: ignore
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-playwright
          path: allure-results/
          if-no-files-found: ignore
      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-playwright
          path: allure-report/
          if-no-files-found: ignore
