name: API Tests

on:
  push:
    branches: [master]
    paths:
      - 'ApiTests/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [master]
    paths:
      - 'ApiTests/**'
      - '.github/workflows/api-tests.yml'
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Test environment (Test, Staging, …)'
        default: 'Test'
        required: false
  workflow_call:
    inputs:
      test_env:
        type: string
        default: 'Test'

jobs:
  api-tests:
    runs-on: ubuntu-latest
    env:
      TEST_ENV: ${{ inputs.test_env || 'Test' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - run: dotnet restore ApiTests/ApiTests.csproj
      - run: dotnet build ApiTests/ApiTests.csproj -c Release --no-restore
      - run: dotnet test ApiTests/ApiTests.csproj -c Release --no-build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results/
          if-no-files-found: warn
