services:
  appium-tests:
    image: appium-tests
    build:
      context: .
      dockerfile: AppiumTests/Dockerfile
    # Optional: add environment variables or ports as needed

  playwright-tests:
    image: playwright-tests
    build:
      context: .
      dockerfile: PlaywrightTests/Dockerfile
    # Playwright tests; for browser tests in CI, consider a Playwright base image

  api-tests:
    image: api-tests
    build:
      context: .
      dockerfile: ApiTests/Dockerfile
    # API tests run during build; service can be used to re-run in CI
